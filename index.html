<style>
:root {
  --bg: #0a0a0a;
  --bg2: #111111;
  --bg3: #191919;
  --border: #222222;
  --border2: #2a2a2a;
  --gold: #d4961e;
  --gold2: #f0b84a;
  --gold-dim: #7a5510;
  --text: #e8e0d0;
  --text-dim: #6a6050;
  --text-mid: #9a8a70;
  --red: #c04030;
  --green: #4a8a3a;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { background: var(--bg); }

body {
  min-height: 100vh;
  min-height: 100dvh;
  background: var(--bg);
  font-family: 'DM Mono', monospace;
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  padding-bottom: env(safe-area-inset-bottom);
}

/* ── HEADER ── */
header {
  position: sticky; top: 0; z-index: 10;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 20px 20px 16px;
  padding-top: calc(20px + env(safe-area-inset-top));
}
.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.logo {
  display: flex; align-items: center; gap: 10px;
}
.logo-icon {
  width: 32px; height: 32px;
  background: var(--gold);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.logo h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 22px;
  color: var(--text);
  letter-spacing: -0.01em;
}
.logo h1 span { color: var(--gold); }

.btn-save {
  padding: 7px 14px;
  background: transparent;
  border: 1px solid var(--border2);
  border-radius: 6px;
  color: var(--text-mid);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.05em;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-save:hover { border-color: var(--gold-dim); color: var(--gold); }
.btn-save.saved { border-color: var(--green); color: #6aba50; }

.stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.stat {
  background: var(--bg2);
  padding: 10px 12px;
  text-align: center;
}
.stat-label {
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 4px;
}
.stat-value {
  font-family: 'DM Serif Display', serif;
  font-size: 17px;
  color: var(--gold);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ── MAIN ── */
main { padding: 20px; max-width: 600px; margin: 0 auto; }

/* ── ADD BOX ── */
.add-box {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  margin-bottom: 20px;
}
.add-label {
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 12px;
}
.add-fields { display: flex; flex-direction: column; gap: 8px; }
.add-row { display: flex; gap: 8px; }

input {
  width: 100%;
  padding: 11px 13px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 7px;
  color: var(--text);
  font-size: 15px;
  font-family: 'DM Mono', monospace;
  outline: none;
  transition: border-color 0.15s;
  -webkit-appearance: none;
}
input::placeholder { color: var(--text-dim); }
input:focus { border-color: var(--gold-dim); }
input[type="date"] { color: var(--text-mid); font-size: 13px; }
input[type="number"] { flex: 1; }

.btn-add {
  padding: 11px 20px;
  background: var(--gold);
  color: var(--bg);
  border: none;
  border-radius: 7px;
  font-family: 'DM Mono', monospace;
  font-weight: 500;
  font-size: 13px;
  letter-spacing: 0.05em;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  flex-shrink: 0;
}
.btn-add:active { background: #b07818; transform: scale(0.97); }
.btn-add.added { background: var(--bg3); color: #6aba50; border: 1px solid var(--green); }

.error { margin-top: 8px; color: var(--red); font-size: 12px; letter-spacing: 0.02em; }

/* ── SORT ── */
.sort-row {
  display: flex;
  gap: 6px;
  align-items: center;
  margin-bottom: 12px;
}
.sort-label {
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-right: 2px;
}
.sort-btn {
  padding: 5px 12px;
  background: transparent;
  color: var(--text-dim);
  border: 1px solid var(--border);
  border-radius: 5px;
  cursor: pointer;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.05em;
  transition: all 0.15s;
}
.sort-btn.active {
  background: var(--bg3);
  color: var(--gold);
  border-color: var(--gold-dim);
}

/* ── BEER LIST ── */
#beer-list { display: flex; flex-direction: column; gap: 2px; }

.beer-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 0;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  transition: border-color 0.15s;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
.beer-row:hover { border-color: var(--border2); }

.beer-main { display: flex; flex-direction: column; gap: 7px; min-width: 0; }
.beer-name {
  font-family: 'DM Serif Display', serif;
  font-size: 17px;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.beer-bar-wrap { display: flex; align-items: center; gap: 8px; }
.beer-bar-track {
  flex: 1;
  height: 3px;
  background: var(--border2);
  border-radius: 2px;
  overflow: hidden;
}
.beer-bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 1s cubic-bezier(.4,0,.2,1);
}
.beer-date {
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0.05em;
}

.beer-score-col {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  justify-content: center;
  padding-left: 16px;
}
.beer-score {
  font-family: 'DM Serif Display', serif;
  font-size: 26px;
  line-height: 1;
}
.beer-score-max {
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0.05em;
  margin-top: 2px;
}

/* ── EMPTY STATE ── */
.empty {
  text-align: center;
  padding: 48px 20px;
  color: var(--text-dim);
  font-size: 13px;
  letter-spacing: 0.05em;
}
.empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.4; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">
      <div class="logo-icon">🍺</div>
      <h1>Beer<span>Log</span></h1>
    </div>
    <button class="btn-save" id="btn-save" onclick="saveFile()">⬇ SPEICHERN</button>
  </div>
  <div class="stats">
    <div class="stat">
      <div class="stat-label">Probiert</div>
      <div class="stat-value" id="stat-count">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Ø Bewertung</div>
      <div class="stat-value" id="stat-avg">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Favorit</div>
      <div class="stat-value" id="stat-best">—</div>
    </div>
  </div>
</header>

<main>
  <div class="add-box">
    <div class="add-label">Neues Bier hinzufügen</div>
    <div class="add-fields">
      <input id="inp-name" placeholder="Bier Name" autocomplete="off"/>
      <div class="add-row">
        <input id="inp-rating" type="number" placeholder="Bewertung 0–10" min="0" max="10" step="0.1"/>
        <input id="inp-date" type="date" style="flex:1"/>
        <button class="btn-add" id="btn-add" onclick="addBeer()">+ ADD</button>
      </div>
    </div>
    <div class="error" id="error-msg"></div>
  </div>

  <div class="sort-row">
    <span class="sort-label">Sort</span>
    <button class="sort-btn active" id="sort-date" onclick="setSort('date')">Datum</button>
    <button class="sort-btn" id="sort-rating" onclick="setSort('rating')">Bewertung</button>
    <button class="sort-btn" id="sort-name" onclick="setSort('name')">Name</button>
  </div>

  <div id="beer-list"></div>
</main>

<script>
const STORAGE_KEY = "beerlog_v2";
const DEFAULT_BEERS = [
  { id:1,  name:"Holtland",              rating:2.0, date:"2026-03-05" },
  { id:2,  name:"Cisk",                  rating:3.4, date:"2026-03-05" },
  { id:3,  name:"Stellar",               rating:4.9, date:"2026-03-05" },
  { id:4,  name:"Grand Harbour",         rating:6.5, date:"2026-03-05" },
  { id:5,  name:"Brewdog Hazy IPA",      rating:7.2, date:"2026-03-05" },
  { id:6,  name:"Sierra Nevada Narwhal", rating:7.8, date:"2026-03-05" },
  { id:7,  name:"San Miguel",            rating:6.2, date:"2026-03-05" },
  { id:8,  name:"Skol",                  rating:2.2, date:"2026-03-05" },
  { id:9,  name:"Farsons Blue Lager",    rating:6.4, date:"2026-03-05" },
  { id:10, name:"Hopleaf PA",            rating:5.4, date:"2026-03-05" },
  { id:11, name:"Cisk Strong",           rating:4.3, date:"2026-03-05" },
];

let beers = [];
let sortBy = "date";

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    beers = raw ? JSON.parse(raw) : [...DEFAULT_BEERS];
  } catch(e) { beers = [...DEFAULT_BEERS]; }
}
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(beers)); } catch(e) {}
}

function getColor(r) {
  if (r >= 8.0) return "#f0b84a";
  if (r >= 6.5) return "#d4961e";
  if (r >= 5.0) return "#a07030";
  if (r >= 3.5) return "#6a5030";
  return "#3a3028";
}

function getSorted() {
  return [...beers].sort((a, b) => {
    if (sortBy === "rating") return b.rating - a.rating;
    if (sortBy === "name") return a.name.localeCompare(b.name);
    return new Date(b.date) - new Date(a.date) || b.id - a.id;
  });
}

function render() {
  const list = document.getElementById("beer-list");
  const sorted = getSorted();

  if (!sorted.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">🍺</div>Noch keine Biere eingetragen.</div>';
  } else {
    list.innerHTML = sorted.map(beer => {
      const color = getColor(beer.rating);
      return `<div class="beer-row">
        <div class="beer-main">
          <div class="beer-name">${esc(beer.name)}</div>
          <div class="beer-bar-wrap">
            <div class="beer-bar-track">
              <div class="beer-bar-fill" style="width:${beer.rating*10}%;background:${color}"></div>
            </div>
          </div>
          <div class="beer-date">${beer.date}</div>
        </div>
        <div class="beer-score-col">
          <div class="beer-score" style="color:${color}">${beer.rating.toFixed(1)}</div>
          <div class="beer-score-max">/10</div>
        </div>
      </div>`;
    }).join("");
  }

  document.getElementById("stat-count").textContent = beers.length;
  if (beers.length) {
    const avg = beers.reduce((s,b) => s + b.rating, 0) / beers.length;
    document.getElementById("stat-avg").textContent = avg.toFixed(1);
    const best = beers.reduce((a,b) => b.rating > a.rating ? b : a);
    document.getElementById("stat-best").textContent = best.name;
  } else {
    document.getElementById("stat-avg").textContent = "—";
    document.getElementById("stat-best").textContent = "—";
  }

  document.querySelectorAll(".sort-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("sort-" + sortBy).classList.add("active");
}

function setSort(s) { sortBy = s; render(); }

function addBeer() {
  const name = document.getElementById("inp-name").value.trim();
  const rRaw = document.getElementById("inp-rating").value;
  const date = document.getElementById("inp-date").value || new Date().toISOString().slice(0,10);
  const r = parseFloat(rRaw);
  const err = document.getElementById("error-msg");

  if (!name) { err.textContent = "Bitte einen Namen eingeben."; return; }
  if (isNaN(r) || r < 0 || r > 10) { err.textContent = "Bewertung muss zwischen 0 und 10 liegen."; return; }
  err.textContent = "";

  beers.push({ id: Date.now(), name, rating: r, date });
  save(); render();

  document.getElementById("inp-name").value = "";
  document.getElementById("inp-rating").value = "";

  const btn = document.getElementById("btn-add");
  btn.textContent = "✓ OK";
  btn.classList.add("added");
  setTimeout(() => { btn.textContent = "+ ADD"; btn.classList.remove("added"); }, 1500);
}

function saveFile() {
  const html = document.documentElement.outerHTML;
  const blob = new Blob([html], { type: "text/html" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "beer-log.html";
  a.click();
  URL.revokeObjectURL(a.href);
  const btn = document.getElementById("btn-save");
  btn.textContent = "✓ GESPEICHERT";
  btn.classList.add("saved");
  setTimeout(() => { btn.textContent = "⬇ SPEICHERN"; btn.classList.remove("saved"); }, 2000);
}

function esc(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// Service Worker für PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}

// Datum vorausfüllen
document.getElementById("inp-date").value = new Date().toISOString().slice(0,10);

// Enter-Taste
document.addEventListener("keydown", e => {
  if (e.key === "Enter" && document.activeElement.closest(".add-box")) addBeer();
});

load();
render();
</script>
</body>
</html>
