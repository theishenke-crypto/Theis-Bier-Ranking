<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Theis Bier Ranking</title>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="BeerLog"/>
<meta name="theme-color" content="#0a0a0a"/>
<link rel="manifest" href="/Theis-Bier-Ranking/manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0a0a0a; --bg2: #111111; --bg3: #181818;
  --border: #1e1e1e; --border2: #2a2a2a;
  --gold: #d4961e; --gold2: #f0b84a; --gold-dim: #7a5510;
  --text: #e8e0d0; --text-dim: #4a4030; --text-mid: #8a7a60;
  --red: #b03828; --green: #3a7a2a;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100dvh; background: var(--bg);
  font-family: 'DM Mono', monospace; color: var(--text);
  -webkit-font-smoothing: antialiased;
  padding-bottom: env(safe-area-inset-bottom);
}
header {
  background: var(--bg); border-bottom: 1px solid var(--border);
  padding: 16px 16px 12px;
  padding-top: calc(16px + env(safe-area-inset-top));
  position: sticky; top: 0; z-index: 50;
}
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.logo { display: flex; align-items: center; gap: 8px; }
.logo-icon { width: 28px; height: 28px; background: var(--gold); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 15px; }
.logo h1 { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--text); }
.logo h1 span { color: var(--gold); }
.btn-save { padding: 6px 12px; background: transparent; border: 1px solid var(--border2); border-radius: 6px; color: var(--text-dim); font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.06em; cursor: pointer; transition: all 0.15s; }
.btn-save:active { border-color: var(--gold-dim); color: var(--gold); }
.btn-save.saved { border-color: var(--green); color: #5ab040; }
.top-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.top-stat { background: var(--bg2); padding: 8px 6px; text-align: center; }
.top-stat-label { font-size: 8px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 3px; }
.top-stat-value { font-family: 'DM Serif Display', serif; font-size: 15px; color: var(--gold); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
main { max-width: 600px; margin: 0 auto; padding: 12px 14px; }

/* ACCORDION */
.accordion { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 12px; overflow: hidden; }
.accordion-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; cursor: pointer; user-select: none; transition: background 0.15s; }
.accordion-header:active { background: var(--bg3); }
.accordion-title { display: flex; align-items: center; gap: 8px; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-mid); }
.accordion-arrow { font-size: 12px; color: var(--text-dim); transition: transform 0.3s; }
.accordion.open .accordion-arrow { transform: rotate(180deg); }
.accordion-body { display: none; padding: 0 14px 14px; }
.accordion.open .accordion-body { display: block; }
.stat-cards { display: flex; flex-direction: column; gap: 12px; }
.stat-card { background: var(--bg3); border-radius: 8px; padding: 12px; }
.stat-card-title { font-size: 8px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 10px; }

/* PODIUM */
.podium { display: flex; flex-direction: column; gap: 4px; }
.podium-row { display: flex; align-items: center; gap: 10px; padding: 7px 10px; border-radius: 6px; background: var(--bg); }
.podium-rank { font-size: 14px; width: 20px; text-align: center; flex-shrink: 0; }
.podium-name { flex: 1; font-family: 'DM Serif Display', serif; font-size: 14px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.podium-score { font-family: 'DM Serif Display', serif; font-size: 16px; flex-shrink: 0; }

/* CHARTS */
.chart-bars { display: flex; align-items: flex-end; gap: 3px; height: 110px; }
.chart-bar-col { display: flex; flex-direction: column; align-items: center; gap: 3px; flex: 1; min-width: 0; height: 100%; justify-content: flex-end; }
.chart-bar { width: 100%; border-radius: 3px 3px 0 0; min-height: 2px; }
.chart-x-label { font-size: 7px; color: var(--text-dim); text-align: center; white-space: nowrap; overflow: hidden; width: 100%; }
.dist-bars { display: flex; flex-direction: column; gap: 5px; }
.dist-row { display: flex; align-items: center; gap: 8px; }
.dist-label { font-size: 10px; color: var(--text-mid); width: 36px; text-align: right; flex-shrink: 0; }
.dist-track { flex: 1; height: 16px; background: var(--bg); border-radius: 3px; overflow: hidden; }
.dist-fill { height: 100%; border-radius: 3px; transition: width 0.8s cubic-bezier(.4,0,.2,1); display: flex; align-items: center; justify-content: flex-end; padding-right: 5px; }
.dist-count { font-size: 9px; color: rgba(0,0,0,0.6); font-weight: 500; }

/* ADD BOX */
.add-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 12px; }
.section-label { font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 10px; }
.add-fields { display: flex; flex-direction: column; gap: 7px; }
.add-row { display: flex; gap: 7px; }
input { width: 100%; padding: 10px 11px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 7px; color: var(--text); font-size: 15px; font-family: 'DM Mono', monospace; outline: none; transition: border-color 0.15s; -webkit-appearance: none; }
input::placeholder { color: var(--text-dim); }
input:focus { border-color: var(--gold-dim); }
input[type="date"] { color: var(--text-mid); font-size: 13px; }
.type-btn {
  flex: 1; padding: 8px 0; background: transparent; border: 1px solid var(--border2);
  border-radius: 7px; color: var(--text-dim); font-family: 'DM Mono', monospace;
  font-size: 12px; cursor: pointer; transition: all 0.15s;
}
.type-btn.active { background: var(--bg3); border-color: var(--gold-dim); color: var(--gold); }
.btn-add { padding: 10px 16px; background: var(--gold); color: var(--bg); border: none; border-radius: 7px; font-family: 'DM Mono', monospace; font-weight: 500; font-size: 13px; cursor: pointer; transition: all 0.15s; white-space: nowrap; flex-shrink: 0; }
.btn-add:active { background: #b07818; transform: scale(0.97); }
.btn-add.added { background: var(--bg3); color: #5ab040; border: 1px solid var(--green); }
.error { margin-top: 7px; color: var(--red); font-size: 12px; }

/* SORT */
.sort-row { display: flex; gap: 5px; align-items: center; margin-bottom: 10px; }
.sort-label { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim); margin-right: 2px; }
.sort-btn { padding: 4px 10px; background: transparent; color: var(--text-dim); border: 1px solid var(--border); border-radius: 5px; cursor: pointer; font-family: 'DM Mono', monospace; font-size: 10px; transition: all 0.15s; }
.sort-btn.active { background: var(--bg3); color: var(--gold); border-color: var(--gold-dim); }

/* BEER LIST */
#beer-list { display: flex; flex-direction: column; gap: 0; }
.beer-row-wrap { position: relative; border-radius: 8px; overflow: hidden; isolation: isolate; margin-bottom: 2px; background: var(--bg); }
.swipe-actions {
  position: absolute; inset: 0; display: flex; border-radius: 8px;
  pointer-events: none;
}
.swipe-del {
  position: absolute; right: 0; top: 0; bottom: 0; width: 80px;
  background: var(--red); display: flex; align-items: center; justify-content: center;
  font-size: 11px; letter-spacing: 0.08em; color: white; font-family: 'DM Mono', monospace;
  opacity: 0; transition: opacity 0.15s; z-index: 0; display: none;
}
.swipe-edit {
  position: absolute; left: 0; top: 0; bottom: 0; width: 80px;
  background: var(--gold-dim); display: flex; align-items: center; justify-content: center;
  font-size: 11px; letter-spacing: 0.08em; color: white; font-family: 'DM Mono', monospace;
  opacity: 0; transition: opacity 0.15s; z-index: 0; display: none;
}
.beer-row {
  display: grid; grid-template-columns: 1fr auto; background: var(--bg2); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 12px; animation: fadeIn 0.25s ease;
  position: relative; z-index: 2; transition: transform 0.15s ease; touch-action: pan-y;
  will-change: transform;
}
@keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }
.beer-main { display: flex; flex-direction: column; gap: 5px; min-width: 0; }
.beer-name { font-family: 'DM Serif Display', serif; font-size: 16px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.beer-bar-wrap { display: flex; align-items: center; gap: 8px; }
.beer-bar-track { flex: 1; height: 3px; background: var(--border2); border-radius: 2px; overflow: hidden; }
.beer-bar-fill { height: 100%; border-radius: 2px; transition: width 0.8s cubic-bezier(.4,0,.2,1); }
.beer-date { font-size: 10px; color: var(--text-dim); }
.beer-right { display: flex; flex-direction: column; align-items: flex-end; justify-content: space-between; padding-left: 12px; }
.beer-score-wrap { display: flex; flex-direction: column; align-items: flex-end; }
.beer-score { font-family: 'DM Serif Display', serif; font-size: 24px; line-height: 1; }
.beer-score-max { font-size: 9px; color: var(--text-dim); }
.beer-actions { display: flex; gap: 4px; margin-top: 4px; }
.btn-action { padding: 3px 7px; background: transparent; border: 1px solid var(--border2); border-radius: 4px; font-family: 'DM Mono', monospace; font-size: 9px; cursor: pointer; transition: all 0.15s; color: var(--text-dim); }
.btn-action.edit:active { border-color: var(--gold-dim); color: var(--gold); }
.btn-action.del:active { border-color: var(--red); color: var(--red); }

/* MODAL */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.open { display: flex; }
.modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: 12px; padding: 18px; width: 100%; max-width: 360px; }
.modal h2 { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--gold); margin-bottom: 14px; }
.modal-fields { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
.modal-btns { display: flex; gap: 8px; }
.btn-confirm { flex:1; padding:10px; background:var(--gold); color:var(--bg); border:none; border-radius:7px; font-family:'DM Mono',monospace; font-size:13px; font-weight:500; cursor:pointer; }
.btn-cancel { flex:1; padding:10px; background:transparent; color:var(--text-mid); border:1px solid var(--border2); border-radius:7px; font-family:'DM Mono',monospace; font-size:13px; cursor:pointer; }
.empty { text-align:center; padding:40px 20px; color:var(--text-dim); font-size:13px; }
.empty-icon { font-size:30px; margin-bottom:10px; opacity:0.3; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">
      <div class="logo-icon">🍺</div>
      <h1>Theis <span>Bier</span></h1>
    </div>
    <button class="btn-save" id="btn-save" onclick="saveFile()">⬇ SPEICHERN</button>
  </div>
  <div class="top-stats">
    <div class="top-stat"><div class="top-stat-label">Probiert</div><div class="top-stat-value" id="stat-count">0</div></div>
    <div class="top-stat"><div class="top-stat-label">Ø Note</div><div class="top-stat-value" id="stat-avg">—</div></div>
    <div class="top-stat"><div class="top-stat-label">Favorit</div><div class="top-stat-value" id="stat-best">—</div></div>
  </div>
</header>

<main>
  <div class="accordion" id="stats-accordion">
    <div class="accordion-header" onclick="toggleAccordion()">
      <div class="accordion-title">STATISTIKEN</div>
      <div class="accordion-arrow">▼</div>
    </div>
    <div class="accordion-body">
      <div class="stat-cards" id="stat-cards"></div>
    </div>
  </div>

  <div class="add-box">
    <div class="section-label">Neues Bier</div>
    <div class="add-fields">
      <input id="inp-name" placeholder="Bier Name" autocomplete="off"/>

      <div class="add-row" style="margin-bottom:0">
        <button class="type-btn active" id="type-flasche" onclick="setType('flasche')">🍺 Flasche</button>
        <button class="type-btn" id="type-gezapft" onclick="setType('gezapft')">🍻 Gezapft</button>
      </div>
      <div class="add-row">
        <input id="inp-rating" type="number" placeholder="0–10" min="0" max="10" step="0.1" style="flex:1"/>
        <input id="inp-date" type="date" style="flex:1.2"/>
        <button class="btn-add" id="btn-add" onclick="addBeer()">+ ADD</button>
      </div>
    </div>
    <div class="error" id="error-msg"></div>
  </div>

  <div style="margin-bottom:10px">
    <div style="position:relative">
      <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--text-dim);pointer-events:none">⌕</span>
      <input id="inp-search" placeholder="Bier suchen..." autocomplete="off" oninput="renderList()" style="background:var(--bg2);border-color:var(--border);padding-left:30px"/>
    </div>
  </div>
  <div class="sort-row" style="margin-bottom:8px">
    <span class="sort-label">Filter</span>
    <button class="sort-btn active" id="filter-all" onclick="setFilter('all')">Alle</button>
    <button class="sort-btn" id="filter-flasche" onclick="setFilter('flasche')">🍺</button>
    <button class="sort-btn" id="filter-gezapft" onclick="setFilter('gezapft')">🍻</button>
  </div>
  <div class="sort-row">
    <span class="sort-label">Sort</span>
    <button class="sort-btn active" id="sort-date" onclick="setSort('date')">Datum</button>
    <button class="sort-btn" id="sort-rating" onclick="setSort('rating')">Note</button>
    <button class="sort-btn" id="sort-name" onclick="setSort('name')">Name</button>
  </div>
  <div id="beer-list"></div>
</main>

<div class="modal-overlay" id="confirm-modal">
  <div class="modal">
    <h2 style="font-size:16px;margin-bottom:8px">Bier löschen?</h2>
    <p style="font-size:13px;color:var(--text-mid);margin-bottom:16px" id="confirm-beer-name"></p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeConfirm()">Abbrechen</button>
      <button class="btn-confirm" style="background:var(--red)" onclick="confirmDelete()">Löschen</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>Bier bearbeiten</h2>
    <div class="modal-fields">
      <input id="edit-name" placeholder="Bier Name"/>
      <div class="add-row">
        <button class="type-btn" id="edit-type-flasche" onclick="setEditType('flasche')">🍺 Flasche</button>
        <button class="type-btn" id="edit-type-gezapft" onclick="setEditType('gezapft')">🍻 Gezapft</button>
      </div>
      <div class="add-row">
        <input id="edit-rating" type="number" placeholder="0–10" min="0" max="10" step="0.1" style="flex:1"/>
        <input id="edit-date" type="date" style="flex:1.2"/>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Abbrechen</button>
      <button class="btn-confirm" onclick="saveEdit()">Speichern</button>
    </div>
  </div>
</div>

<script>
// Support multiple storage keys so old data is not lost
const KEYS = ["beerlog_v3", "beerlog_v2", "beer_log_v1"];
const STORAGE_KEY = "beerlog_v3";

const DEFAULT_BEERS = [
  {id:1,  name:"Holtland",              rating:2.0, date:"2026-03-05"},
  {id:2,  name:"Cisk",                  rating:3.4, date:"2026-03-05"},
  {id:3,  name:"Stellar",               rating:4.9, date:"2026-03-05"},
  {id:4,  name:"Grand Harbour",         rating:6.5, date:"2026-03-05"},
  {id:5,  name:"Brewdog Hazy IPA",      rating:7.2, date:"2026-03-05"},
  {id:6,  name:"Sierra Nevada Narwhal", rating:7.8, date:"2026-03-05"},
  {id:7,  name:"San Miguel",            rating:6.2, date:"2026-03-05"},
  {id:8,  name:"Skol",                  rating:2.2, date:"2026-03-05"},
  {id:9,  name:"Farsons Blue Lager",    rating:6.4, date:"2026-03-05"},
  {id:10, name:"Hopleaf PA",            rating:5.4, date:"2026-03-05"},
  {id:11, name:"Cisk Strong",           rating:4.3, date:"2026-03-05"},
];

let beers = [];
let sortBy = "date";
let editingId = null;

function load() {
  try {
    // Try each key, use the one with most data
    let best = null;
    for (const key of KEYS) {
      const raw = localStorage.getItem(key);
      if (raw) {
        const parsed = JSON.parse(raw);
        if (!best || parsed.length > best.length) best = parsed;
      }
    }
    beers = best || [...DEFAULT_BEERS];
    // Migrate to latest key
    localStorage.setItem(STORAGE_KEY, JSON.stringify(beers));
  } catch(e) { beers = [...DEFAULT_BEERS]; }
}

function save() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(beers)); } catch(e) {} }

function getColor(r) {
  if (r >= 8.0) return "#f0b84a";
  if (r >= 6.5) return "#d4961e";
  if (r >= 5.0) return "#a07030";
  if (r >= 3.5) return "#6a5030";
  return "#3a2e20";
}

// Icon based on rating
function getRatingIcon(r) {
  if (r >= 8.0) return "🏆";
  if (r >= 6.5) return "😄";
  if (r >= 5.0) return "🙂";
  if (r >= 3.5) return "😐";
  return "💀";
}

function getSorted() {
  return [...beers].sort((a,b) => {
    if (sortBy==="rating") return b.rating-a.rating;
    if (sortBy==="name") return a.name.localeCompare(b.name);
    return new Date(b.date)-new Date(a.date) || b.id-a.id;
  });
}

function setSort(s) {
  sortBy=s; renderList();
  document.querySelectorAll(".sort-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById("sort-"+s).classList.add("active");
}

function renderList() {
  const list = document.getElementById("beer-list");
  const q = (document.getElementById("inp-search")||{value:""}).value.trim().toLowerCase();
  const sorted = getSorted()
    .filter(b => !q || b.name.toLowerCase().includes(q))
    .filter(b => currentFilter==='all' || (b.type||'flasche')===currentFilter);
  if (!sorted.length) { list.innerHTML='<div class="empty"><div class="empty-icon">🍺</div>Noch keine Biere.</div>'; return; }
  list.innerHTML = sorted.map(beer => {
    const c = getColor(beer.rating);
    return `<div class="beer-row-wrap">
      <div class="swipe-edit">EDIT</div>
      <div class="swipe-del">DEL</div>
      <div class="beer-row" data-id="${beer.id}">
      <div class="beer-main">
        <div style="display:flex;align-items:center;gap:6px;min-width:0">
          <div class="beer-name">${esc(beer.name)}</div>
          <span style="font-size:11px;opacity:0.5;flex-shrink:0">${beer.type==='gezapft'?'🍻':'🍺'}</span>
        </div>
        <div class="beer-bar-wrap">
          <div class="beer-bar-track"><div class="beer-bar-fill" style="width:${beer.rating*10}%;background:${c}"></div></div>
        </div>
        <div class="beer-date">${fmtDate(beer.date)}</div>
      </div>
      <div class="beer-right">
        <div class="beer-score-wrap">
          <div class="beer-score" style="color:${c}">${beer.rating.toFixed(1)}</div>
          <div class="beer-score-max">/10</div>
        </div>
        <div class="beer-actions">
          <button class="btn-action edit" onclick="openEdit(${beer.id})">EDIT</button>
          <button class="btn-action del" onclick="openConfirm(${beer.id})">DEL</button>
        </div>
      </div>
    </div>`;
  }).join("");
}

function renderHeader() {
  document.getElementById("stat-count").textContent = beers.length;
  if (beers.length) {
    const avg = beers.reduce((s,b)=>s+b.rating,0)/beers.length;
    document.getElementById("stat-avg").textContent = avg.toFixed(1);
    const best = beers.reduce((a,b)=>b.rating>a.rating?b:a);
    document.getElementById("stat-best").textContent = best.name;
  } else {
    document.getElementById("stat-avg").textContent="—";
    document.getElementById("stat-best").textContent="—";
  }
}

function renderStats() {
  const container = document.getElementById("stat-cards");
  if (!beers.length) { container.innerHTML='<div class="empty"><div class="empty-icon">📊</div>Noch keine Daten.</div>'; return; }

  // 1. Best 3 (gold icons by color)
  const sorted_r = [...beers].sort((a,b)=>b.rating-a.rating);
  const top3 = sorted_r.slice(0,3);
  // 2. Worst 3 — schlechtestes ganz unten
  const worst3 = sorted_r.slice(-3); // already ascending from bottom

  const podiumHTML = (list, icons) => list.map((b,i) => {
    const c = getColor(b.rating);
    return `<div class="podium-row">
      <div class="podium-rank" style="color:${c}">${icons[i]}</div>
      <div class="podium-name">${esc(b.name)}</div>
      <div class="podium-score" style="color:${c}">${b.rating.toFixed(1)}</div>
    </div>`;
  }).join("");

  // 3. Monthly average
  const months = {};
  beers.forEach(b => {
    const m = b.date.slice(0,7);
    if (!months[m]) months[m]=[];
    months[m].push(b.rating);
  });
  const monthKeys = Object.keys(months).sort();
  const monthAvgs = monthKeys.map(m => months[m].reduce((s,r)=>s+r,0)/months[m].length);
  const monthBarsHTML = monthKeys.length ? monthKeys.map((m,i) => {
    const pct = (monthAvgs[i]/10)*100;
    const c = getColor(monthAvgs[i]);
    const label = fmtMonth(m);
    return `<div class="chart-bar-col">
      <div class="chart-bar" style="height:${pct}%;background:${c};display:flex;align-items:${pct>25?'flex-start':'center'};justify-content:center;padding-top:${pct>25?'4px':'0'}">
        <span style="font-size:8px;color:rgba(0,0,0,0.75);font-weight:500;font-family:'DM Mono',monospace;writing-mode:horizontal-tb">${monthAvgs[i].toFixed(1)}</span>
      </div>
      <div class="chart-x-label">${label}</div>
    </div>`;
  }).join("") : '<div style="color:var(--text-dim);font-size:12px;text-align:center;padding:20px;width:100%">Noch keine Daten</div>';

  // 4. Distribution
  const buckets = [{l:"0–2",min:0,max:2},{l:"2–4",min:2,max:4},{l:"4–6",min:4,max:6},{l:"6–8",min:6,max:8},{l:"8–10",min:8,max:10.1}];
  const counts = buckets.map(bk => beers.filter(b=>b.rating>=bk.min&&b.rating<bk.max).length);
  const maxCount = Math.max(...counts, 1);
  const distHTML = buckets.map((bk,i) => {
    const pct = (counts[i]/maxCount)*100;
    const c = getColor((bk.min+Math.min(bk.max,10))/2);
    return `<div class="dist-row">
      <div class="dist-label">${bk.l}</div>
      <div class="dist-track">
        <div class="dist-fill" style="width:${pct}%;background:${c}">
          ${counts[i]>0?`<span class="dist-count">${counts[i]}</span>`:''}
        </div>
      </div>
    </div>`;
  }).join("");

  // 5. Timeline — sorted by date ascending
  const timeline = [...beers].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const timelineHTML = timeline.length >= 2
    ? `<div class="chart-bars">${timeline.map(b => {
        const pct = (b.rating/10)*100;
        const c = getColor(b.rating);
        return `<div class="chart-bar-col">
          <div class="chart-bar" style="height:${pct}%;background:${c}" title="${esc(b.name)}"></div>
          <div class="chart-x-label">${fmtDate(b.date).slice(0,5)}</div>
        </div>`;
      }).join("")}</div>`
    : '<div style="color:var(--text-dim);font-size:12px;text-align:center;padding:20px">Mindestens 2 Biere nötig</div>';

  container.innerHTML = `
    <div class="stat-card">
      <div class="stat-card-title">TOP 3</div>
      <div class="podium">${podiumHTML(top3, ['🥇','🥈','🥉'])}</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-title">SCHLECHTESTE 3</div>
      <div class="podium">${podiumHTML(worst3, ['😐','😬','💀'])}</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-title">Ø NOTE PRO MONAT</div>
      <div class="chart-bars">${monthBarsHTML}</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-title">BEWERTUNGSVERTEILUNG</div>
      <div class="dist-bars">${distHTML}</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-title">VERLAUF NACH DATUM</div>
      ${timelineHTML}
    </div>`;
}

function toggleAccordion() {
  const acc = document.getElementById("stats-accordion");
  acc.classList.toggle("open");
  if (acc.classList.contains("open")) renderStats();
}

function addBeer() {
  const name = document.getElementById("inp-name").value.trim();
  const rRaw = document.getElementById("inp-rating").value;
  const date = document.getElementById("inp-date").value || new Date().toISOString().slice(0,10);
  const r = parseFloat(rRaw);
  const err = document.getElementById("error-msg");
  if (!name) { err.textContent="Bitte einen Namen eingeben."; return; }
  if (isNaN(r)||r<0||r>10) { err.textContent="Bewertung muss zwischen 0 und 10 liegen."; return; }
  err.textContent="";
  beers.push({id:Date.now(), name, rating:r, date, type:currentType});
  save(); renderList(); renderHeader();
  if (document.getElementById("stats-accordion").classList.contains("open")) renderStats();
  document.getElementById("inp-name").value="";
  document.getElementById("inp-rating").value="";
  const btn = document.getElementById("btn-add");
  btn.textContent="✓ OK"; btn.classList.add("added");
  setTimeout(()=>{ btn.textContent="+ ADD"; btn.classList.remove("added"); },1500);
}

function deleteBeer(id, silent=false) {
  if (!silent && !confirm("Bier löschen?")) return;
  beers = beers.filter(b=>b.id!==id);
  save(); renderList(); renderHeader();
  if (document.getElementById("stats-accordion").classList.contains("open")) renderStats();
}

function openEdit(id) {
  const beer = beers.find(b=>b.id===id);
  if (!beer) return;
  editingId=id;
  document.getElementById("edit-name").value=beer.name;
  document.getElementById("edit-rating").value=beer.rating;
  document.getElementById("edit-date").value=beer.date;
  currentEditType = beer.type||'flasche';
  setEditType(currentEditType);
  document.getElementById("modal").classList.add("open");
}
function closeModal() { document.getElementById("modal").classList.remove("open"); editingId=null; }
function saveEdit() {
  const name = document.getElementById("edit-name").value.trim();
  const r = parseFloat(document.getElementById("edit-rating").value);
  const date = document.getElementById("edit-date").value;
  if (!name||isNaN(r)||r<0||r>10) return;
  const beer = beers.find(b=>b.id===editingId);
  if (beer) { beer.name=name; beer.rating=r; beer.date=date; beer.type=currentEditType; }
  save(); renderList(); renderHeader();
  if (document.getElementById("stats-accordion").classList.contains("open")) renderStats();
  closeModal();
}

function saveFile() {
  const html = document.documentElement.outerHTML;
  const blob = new Blob([html],{type:"text/html"});
  const a = document.createElement("a");
  a.href=URL.createObjectURL(blob); a.download="beer-log.html"; a.click();
  URL.revokeObjectURL(a.href);
  const btn = document.getElementById("btn-save");
  btn.textContent="✓ GESPEICHERT"; btn.classList.add("saved");
  setTimeout(()=>{ btn.textContent="⬇ SPEICHERN"; btn.classList.remove("saved"); },2000);
}

let currentType = 'flasche';
let currentEditType = 'flasche';
let currentFilter = 'all';

function setType(t) {
  currentType = t;
  document.getElementById("type-flasche").classList.toggle("active", t==="flasche");
  document.getElementById("type-gezapft").classList.toggle("active", t==="gezapft");
}
function setEditType(t) {
  currentEditType = t;
  document.getElementById("edit-type-flasche").classList.toggle("active", t==="flasche");
  document.getElementById("edit-type-gezapft").classList.toggle("active", t==="gezapft");
}
function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll("[id^='filter-']").forEach(b=>b.classList.remove("active"));
  document.getElementById("filter-"+f).classList.add("active");
  renderList();
}

function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

// Format YYYY-MM-DD to DD.MM.YYYY
function fmtDate(d) {
  if (!d) return "";
  const p = d.split("-");
  if (p.length !== 3) return d;
  return p[2] + "." + p[1] + "." + p[0];
}

// Format YYYY-MM to MM.YYYY
function fmtMonth(m) {
  if (!m) return "";
  const p = m.split("-");
  if (p.length !== 2) return m;
  return p[1] + "." + p[0];
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('/Theis-Bier-Ranking/sw.js').catch(()=>{});

document.getElementById("inp-date").value = new Date().toISOString().slice(0,10);
document.addEventListener("keydown", e => { if (e.key==="Enter"&&document.activeElement.closest(".add-box")) addBeer(); });
document.getElementById("modal").addEventListener("click", e => { if (e.target===document.getElementById("modal")) closeModal(); });

let pendingDeleteId = null;
function openConfirm(id) {
  pendingDeleteId = id;
  const beer = beers.find(b=>b.id===id);
  document.getElementById("confirm-beer-name").textContent = beer ? beer.name : "";
  document.getElementById("confirm-modal").classList.add("open");
}
function closeConfirm() {
  document.getElementById("confirm-modal").classList.remove("open");
  pendingDeleteId = null;
}
function confirmDelete() {
  if (pendingDeleteId) deleteBeer(pendingDeleteId, true);
  closeConfirm();
}

load(); renderList(); renderHeader();

// Swipe gestures
let swipeStartX = 0, swipeStartY = 0, swipeEl = null, swipeId = null, swipeDx = 0;
const THRESHOLD = 70;

document.getElementById("beer-list").addEventListener("touchstart", e => {
  const row = e.target.closest(".beer-row");
  if (!row) return;
  swipeEl = row;
  swipeId = parseInt(row.dataset.id);
  swipeStartX = e.touches[0].clientX;
  swipeStartY = e.touches[0].clientY;
  swipeDx = 0;
  // Show swipe backgrounds
  const wrap0 = row.closest(".beer-row-wrap");
  if (wrap0) {
    const d = wrap0.querySelector(".swipe-del");
    const ed = wrap0.querySelector(".swipe-edit");
    if (d) d.style.display = "flex";
    if (ed) ed.style.display = "flex";
  }
}, {passive: true});

document.getElementById("beer-list").addEventListener("touchmove", e => {
  if (!swipeEl) return;
  const dx = e.touches[0].clientX - swipeStartX;
  const dy = e.touches[0].clientY - swipeStartY;
  if (Math.abs(dy) > Math.abs(dx) + 5) { swipeEl = null; return; }
  swipeDx = dx;
  const clamped = Math.max(-THRESHOLD*1.2, Math.min(THRESHOLD*1.2, dx));
  swipeEl.style.transform = `translateX(${clamped}px)`;
  // Show hint labels
  const wrap = swipeEl.closest(".beer-row-wrap");
  if (wrap) {
    const del = wrap.querySelector(".swipe-del");
    const edit = wrap.querySelector(".swipe-edit");
    if (del) del.style.opacity = dx < -20 ? Math.min(1, (-dx-20)/50) : 0;
    if (edit) edit.style.opacity = dx > 20 ? Math.min(1, (dx-20)/50) : 0;
  }
}, {passive: true});

document.getElementById("beer-list").addEventListener("touchend", e => {
  if (!swipeEl) return;
  if (swipeDx < -THRESHOLD) {
    // Show confirm
    swipeEl.style.transform = "";
    const wrap = swipeEl.closest(".beer-row-wrap");
    if (wrap) {
      const del = wrap.querySelector(".swipe-del");
      const edit = wrap.querySelector(".swipe-edit");
      if (del) { del.style.opacity = 0; setTimeout(()=>{ del.style.display="none"; },150); }
      if (edit) { edit.style.opacity = 0; setTimeout(()=>{ edit.style.display="none"; },150); }
    }
    openConfirm(swipeId);
  } else if (swipeDx > THRESHOLD) {
    // Edit
    swipeEl.style.transform = "";
    openEdit(swipeId);
  } else {
    swipeEl.style.transform = "";
    const wrap = swipeEl.closest(".beer-row-wrap");
    if (wrap) {
      const del = wrap.querySelector(".swipe-del");
      const edit = wrap.querySelector(".swipe-edit");
      if (del) { del.style.opacity = 0; setTimeout(()=>{ del.style.display="none"; },150); }
      if (edit) { edit.style.opacity = 0; setTimeout(()=>{ edit.style.display="none"; },150); }
    }
  }
  swipeEl = null; swipeId = null; swipeDx = 0;
}, {passive: true});
</script>
